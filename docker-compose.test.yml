services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mqtt
      POSTGRES_USER: mqtt
      POSTGRES_PASSWORD: mqtt
    volumes:
      - ./config/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mqtt"]
      interval: 3s
      timeout: 3s
      retries: 10

  broker:
    build: .
    image: mqtt-broker:test
    ports:
      - "1883:1883"
    volumes:
      - ./config/broker.pg.json:/etc/mqtt-broker/broker.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c 'echo > /dev/tcp/127.0.0.1/1883'"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s
